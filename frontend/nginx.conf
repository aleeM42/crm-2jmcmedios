server {
    listen       80;
    server_name  localhost;

    # Gzip Compression para mejorar la velocidad de carga de archivos de texto y JS
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Directorio base para el frontend React
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Esto soluciona el problema del React Router al recargar páginas
        try_files $uri $uri/ /index.html;
    }

    # Proxy inverso hacia el backend de Express
    location /api/ {
        # 'backend' es el nombre del servicio en el docker-compose
        proxy_pass http://backend:3001/api/;
        
        # Opcional pero recomendado: configurar los headers para mantener el IP real si estuvieras detrás de otro LB
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Bloque de página de error por defecto (opcional)
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
