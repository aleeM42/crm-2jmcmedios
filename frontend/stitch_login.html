<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Montserrat:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#15afb7",
                        "background-light": "#f6f8f8",
                        "background-dark": "#112021",
                        "accent-teal": "#55CCD3",
                    },
                    fontFamily: {
                        "display": ["Montserrat", "Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Montserrat', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark overflow-hidden">
<div class="flex h-screen w-full">
<!-- Left Side: Gradient & Brand Visual -->
<div class="hidden lg:flex w-1/2 bg-gradient-to-br from-[#16B1B8] to-[#55CCD3] relative items-center justify-center overflow-hidden">
<!-- Subtle Vortex/Spiral Watermark -->
<div class="absolute inset-0 opacity-10 flex items-center justify-center">
<svg fill="white" height="600" viewbox="0 0 512 512" width="600" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M256 0C114.6 0 0 114.6 0 256s114.6 256 256 256 256-114.6 256-256S397.4 0 256 0zm0 464c-114.7 0-208-93.3-208-208S141.3 48 256 48s208 93.3 208 208-93.3 208-208 208zm-96-208c0-53 43-96 96-96s96 43 96 96-43 96-96 96-96-43-96-96z" fill-rule="evenodd" opacity="0.3"></path>
<circle cx="256" cy="256" fill="none" opacity="0.2" r="150" stroke="white" stroke-width="2"></circle>
<circle cx="256" cy="256" fill="none" opacity="0.1" r="100" stroke="white" stroke-width="2"></circle>
</svg>
</div>
<div class="relative z-10 text-center text-white px-12">
<div class="mb-6 flex justify-center">
<div class="p-4 bg-white/10 backdrop-blur-md rounded-2xl border border-white/20">
<span class="material-symbols-outlined text-6xl">hub</span>
</div>
</div>
<h2 class="text-4xl font-bold tracking-tight mb-4">2JMC Medios</h2>
<p class="text-white/80 text-lg font-light max-w-md mx-auto">Gestión inteligente de medios y comunicación para la era digital.</p>
</div>
<!-- Decorative Elements -->
<div class="absolute top-10 left-10 w-32 h-32 bg-white/5 rounded-full blur-3xl"></div>
<div class="absolute bottom-10 right-10 w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>
</div>
<!-- Right Side: Login Form -->
<div class="w-full lg:w-1/2 bg-white dark:bg-background-dark flex flex-col items-center justify-center p-8 lg:p-24">
<div class="w-full max-w-md">
<!-- Mobile Logo (shown only on small screens) -->
<div class="lg:hidden flex items-center justify-center gap-3 mb-12">
<span class="material-symbols-outlined text-primary text-4xl">hub</span>
<h2 class="text-slate-900 dark:text-slate-100 text-2xl font-bold font-display">2JMC Medios</h2>
</div>
<div class="mb-10 text-center lg:text-left">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold font-display mb-2">Iniciar Sesión</h1>
<p class="text-slate-500 dark:text-slate-400 font-light">Bienvenido de nuevo al CRM de 2JMC Medios.</p>
</div>
<form class="space-y-6">
<!-- User Input -->
<div>
<label class="block text-slate-700 dark:text-slate-300 text-sm font-semibold mb-2 font-display">Usuario</label>
<div class="relative">
<input class="w-full h-14 px-4 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-slate-100 font-display" placeholder="Nombre de usuario o correo" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
</div>
</div>
<!-- Password Input -->
<div>
<div class="flex justify-between mb-2">
<label class="block text-slate-700 dark:text-slate-300 text-sm font-semibold font-display">Contraseña</label>
<a class="text-xs text-primary font-medium hover:underline" href="#">¿Olvidó su contraseña?</a>
</div>
<div class="relative">
<input class="w-full h-14 px-4 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-slate-100 font-display" placeholder="••••••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary cursor-pointer" id="remember" type="checkbox"/>
<label class="ml-2 text-sm text-slate-600 dark:text-slate-400 cursor-pointer" for="remember">Mantener sesión iniciada</label>
</div>
<!-- Submit Button -->
<button class="w-full h-14 bg-gradient-to-r from-[#16B1B8] to-[#15afb7] hover:opacity-90 text-white font-bold text-lg rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group" type="submit">
<span>Ingresar</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">login</span>
</button>
</form>
<!-- Footer Text -->
<div class="mt-16 text-center">
<p class="text-slate-400 dark:text-slate-600 text-xs tracking-widest font-medium uppercase font-display">
                        CRM 2JMC Medios © 2026
                    </p>
</div>
</div>
</div>
</div>
</body></html>
